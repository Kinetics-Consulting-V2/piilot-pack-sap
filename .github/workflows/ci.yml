name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Plugin contract checks
    runs-on: ubuntu-latest
    # These checks verify the plugin doesn't violate the SDK contract.
    # They're cheap (no install, no docker) — run them first, fail-fast.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: No `from backend.*` / `import backend` imports
        # The core loader's AST check refuses these at boot. Catch
        # them in CI to fail fast without booting the core.
        run: |
          set -e
          OFFENDERS=$(grep -rn -E "^\s*(from|import)\s+backend(\.|\s|$)" \
              --include="*.py" \
              --exclude-dir=__pycache__ \
              --exclude-dir=.git \
              --exclude-dir=.venv \
              --exclude-dir=venv \
              --exclude-dir=node_modules \
              . || true)
          if [ -n "$OFFENDERS" ]; then
              echo "❌ Plugin imports from backend.*:" >&2
              echo "$OFFENDERS" >&2
              echo "" >&2
              echo "Plugins must only import from piilot.sdk.*. See" >&2
              echo "https://github.com/Kinetics-Consulting-V2/AICockpit/blob/main/docs/sdk/PLUGIN_DEV_WORKFLOW.md#01-vue-densemble" >&2
              exit 1
          fi
          echo "✅ No backend.* imports."

      - name: No deprecated SDK call patterns (`ctx.tools.register`, `ctx.http.register_router`, …)
        # Older SDK rcs exposed these via Context — they are now
        # module-level. Keep them out of new plugins.
        run: |
          set -e
          OFFENDERS=$(grep -rn -E "\bctx\.(http|tools|connectors)\.register(_router)?\b" \
              --include="*.py" \
              --exclude-dir=__pycache__ \
              --exclude-dir=.git \
              . || true)
          if [ -n "$OFFENDERS" ]; then
              echo "❌ Deprecated SDK call pattern (use module-level register_*):" >&2
              echo "$OFFENDERS" >&2
              exit 1
          fi
          echo "✅ No deprecated ctx.*.register patterns."

      - name: Manifest JSON schema validation
        # Validate [tool.piilot.plugin] in pyproject.toml against the
        # SDK's MANIFEST_SCHEMA (shipped with piilot-sdk).
        run: |
          pip install --quiet "piilot-sdk>=0.7.0,<1.0.0" jsonschema
          python - <<'PY'
          import sys, tomllib
          from piilot.sdk import MANIFEST_SCHEMA, load_manifest

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          manifest = data.get("tool", {}).get("piilot", {}).get("plugin")
          if not manifest:
              print("❌ No [tool.piilot.plugin] section in pyproject.toml", file=sys.stderr)
              sys.exit(1)

          try:
              # load_manifest also normalises + validates (license SPDX,
              # namespace regex, sdk_compat parseable, etc.).
              load_manifest("pyproject.toml")
          except Exception as e:
              print(f"❌ Manifest validation failed: {e}", file=sys.stderr)
              sys.exit(1)
          print("✅ Manifest valid against piilot-sdk MANIFEST_SCHEMA.")
          PY

  test:
    name: Python ${{ matrix.python-version }} / SDK ${{ matrix.piilot-sdk }}
    runs-on: ubuntu-latest
    needs: contract
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        # Pin every supported SDK version in your sdk_compat range.
        # Bump this list when your plugin's sdk_compat upper bound moves.
        #
        # To test against the bleeding-edge SDK (e.g. upstream main or
        # a pre-release), add an entry like "latest-pre" and handle it
        # in the Install step below with:
        #   pip install --pre --index-url https://test.pypi.org/simple/ \
        #     --extra-index-url https://pypi.org/simple/ piilot-sdk
        piilot-sdk:
          - "0.7.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install piilot-sdk (pinned)
        run: pip install "piilot-sdk==${{ matrix.piilot-sdk }}"

      - name: Install the plugin in editable mode + dev extras
        run: pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Black (check only)
        run: black --check .

      - name: Pytest
        run: pytest --cov --cov-report=term-missing
