name: Release UI

# Publishes piilot-pack-sap-ui to npm whenever a tag matching
# ``ui-v*`` is pushed. Separate tag namespace from any PyPI backend
# release workflow (``v*``) so the two packages can ship independently.
#
# Tag convention:
#   ui-v0.3.0       → npm (stable)
#
# Authentication: ``NPM_TOKEN`` secret stored in the GitHub env
# ``npm``. Create a Classic Automation token on npmjs.com (bypasses
# 2FA by design) and add it to the env. See frontend/README.md.

on:
  push:
    tags:
      - 'ui-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/piilot-pack-sap-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Parse tag and validate against package.json version
        working-directory: frontend
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#ui-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "tag=$TAG"
          echo "version-from-tag=$VERSION"
          echo "version-from-package=$PKG_VERSION"

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG implies version $VERSION, but package.json declares $PKG_VERSION. Bump package.json and re-tag."
            exit 1
          fi

      - name: Publish
        working-directory: frontend
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
